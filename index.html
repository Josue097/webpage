<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Primera Página Web</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:0;
            background-color:#f4f4f4;
        }

        header{
            background:#333;
            color:white;
            text-align:center;
            padding:20px;
        }

        nav{
            background:#555;
            padding:10px;
            text-align:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:15px;
            font-weight:bold;
        }

        nav a:hover{
            color:yellow;
        }

        .contenedor{
            padding:20px;
        }

        footer{
            background:#333;
            color:white;
            text-align:center;
            padding:10px;
            position:fixed;
            bottom:0;
            width:100%;
        }

        button{
            padding:10px 20px;
            font-size:16px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<header>
    <h1>Bienvenido a mi Página Web</h1>
    <p>Creada con HTML, CSS y un poco de JavaScript</p>
</header>

<nav>
    <a href="#">Inicio</a>
    <a href="#">Servicios</a>
    <a href="#">Contacto</a>
</nav>

<div class="contenedor">
    <h2>Sobre esta página</h2>
    <p>Esta es una página web básica creada para practicar en Visual Studio Code.</p>

    <button onclick="saludar()">Haz clic aquí</button>
</div>

<footer>
    <p>© 2026 - Mi Página Web</p>
</footer>

<script>
function saludar(){
    alert("Hola! Gracias por visitar mi página web.");
}
</script>

</body>
</html>
